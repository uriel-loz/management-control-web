<mat-form-field>
  <mat-label>-- Elige una opción --</mat-label>
  <mat-select
    name="role"
    id="role"
    [value]="stateService.selectedRole()?.id"
    (selectionChange)="onRoleChange($event)"
  >
    @for (role of roles(); track role.id) {
      <mat-option [value]="role.id">{{ role.name }}</mat-option>
    }
  </mat-select>
</mat-form-field>
