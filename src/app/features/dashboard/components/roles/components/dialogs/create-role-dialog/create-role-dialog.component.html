<div class="dialog-wrapper">
  <button class="close-btn" mat-icon-button type="button" (click)="cancel()">
    <mat-icon>close</mat-icon>
  </button>

  <div class="dialog-header">
    <div class="header-icon">
      <mat-icon>shield</mat-icon>
    </div>
    <div class="header-text">
      <span class="header-title">Crear rol</span>
      <span class="header-sub">Define un nuevo nivel de acceso</span>
    </div>
  </div>

  <mat-dialog-content>
    <form class="form-body" (submit)="save()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nombre del rol</mat-label>
        <input
          matInput
          [formControl]="roleNameControl"
          placeholder="Ej: Administrador"
          autocomplete="off"
        />
        @if (roleNameControl.hasError('required')) {
          <mat-error>El nombre del rol es requerido.</mat-error>
        } @else if (roleNameControl.hasError('minlength')) {
          <mat-error>El nombre debe tener al menos 2 caracteres.</mat-error>
        }
      </mat-form-field>
    </form>
  </mat-dialog-content>

  <div class="dialog-footer">
    <button mat-stroked-button class="cancel-btn" type="button" (click)="cancel()" [disabled]="isLoading()">
      Cancelar
    </button>
    <button mat-flat-button class="save-btn" type="button" (click)="save()" [disabled]="isLoading()">
      {{ isLoading() ? 'Creando...' : 'Crear rol' }}
    </button>
  </div>
</div>
