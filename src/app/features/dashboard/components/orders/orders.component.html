<core-card-structure title="Órdenes" description="Órdenes generadas por los clientes">
  <core-data-table
    [columns]="columns"
    [data]="data()"
    [actions]="actions"
    [serverSide]="true"
    [total]="total()"
    [showAllOption]="true"
    sortActive="updated_at"
    sortDirection="desc"
    (refresh)="onRefresh()"
    (pageChange)="onPageChange($event)"
    (filterChange)="onFilterChange($event)"
    (sortChange)="onSortChange($event)"
    (actionClick)="onAction($event)"
    titleReport="{{ titleReport }}"
  ></core-data-table>
</core-card-structure>
