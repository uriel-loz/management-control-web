<core-card-structure
    title="Categorías"
    description="Categorías registradas en el sistema"
>
  <core-data-table
    [columns]="columns"
    [data]="data()"
    [actions]="actions()"
    [serverSide]="true"
    [total]="total()"
    [showAllOption]="true"
    sortActive="updated_at"
    sortDirection="desc"
    [showCreate]="canCreate()"
    createLabel="Crear categoría"
    (refresh)="onRefresh()"
    (create)="onCreate()"
    (pageChange)="onPageChange($event)"
    (filterChange)="onFilterChange($event)"
    (sortChange)="onSortChange($event)"
    (actionClick)="onAction($event)"
    titleReport="{{ titleReport }}"
  >
  </core-data-table>
</core-card-structure>
