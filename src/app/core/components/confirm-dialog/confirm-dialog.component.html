<h2 mat-dialog-title class="dialog-title">
  <mat-icon class="warning-icon">warning_amber</mat-icon>
  {{ title }}
</h2>

<mat-dialog-content>
  <p class="dialog-message">{{ message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="cancel()">Cancelar</button>
  <button mat-raised-button class="confirm-btn" type="button" (click)="confirm()">
    Confirmar
  </button>
</mat-dialog-actions>
